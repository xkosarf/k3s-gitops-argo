apiVersion: v1
data:
  index.html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta
    name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>k3s
    Security Lab · kosar.sk</title>\n<style>\n  /* ── TOKENS ── */\n  :root {\n    --bg:
    \       #0e1525;\n    --bg-card:   #131f35;\n    --bg-deep:   #0a1020;\n    --bg-inset:
    \ #0e1a2e;\n    --blue-hi:   #2288ff;\n    --blue-mid:  #1a55dd;\n    --blue-lo:
    \  #4499ff;\n    --blue-mute: #335588;\n    --blue-dim:  #1a3060;\n    --text-head:
    #e8f0ff;\n    --text-body: #7090bb;\n    --text-dim:  #3a5888;\n    --border:
    \   #1e3060;\n    --border-hi: #2244aa;\n    --green:     #22aa44;\n    --grid:
    \     #141e33;\n  }\n\n  /* ── RESET ── */\n  *, *::before, *::after { box-sizing:
    border-box; margin: 0; padding: 0; }\n  html { scroll-behavior: smooth; }\n\n
    \ body {\n    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;\n    background:
    var(--bg);\n    color: var(--text-body);\n    line-height: 1.6;\n    min-height:
    100vh;\n    /* subtle dot grid */\n    background-image: radial-gradient(circle,
    var(--grid) 1px, transparent 1px);\n    background-size: 60px 60px;\n  }\n\n  /*
    ── NAVBAR ── */\n  nav {\n    position: sticky;\n    top: 0;\n    z-index: 100;\n
    \   background: #111827;\n    border-bottom: 1px solid var(--border);\n    padding:
    0 40px;\n    height: 52px;\n    display: flex;\n    align-items: center;\n    justify-content:
    space-between;\n    box-shadow: 0 2px 20px rgba(0,0,0,0.4);\n  }\n\n  .nav-logo
    {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    text-decoration:
    none;\n  }\n\n  .nav-logo-box {\n    width: 26px; height: 26px;\n    background:
    var(--blue-mid);\n    border-radius: 5px;\n    display: flex; align-items: center;
    justify-content: center;\n    font-family: monospace;\n    font-size: 13px;\n
    \   color: #fff;\n    /* 3D effect */\n    box-shadow: 2px 2px 0 #0d2a88, inset
    0 1px 0 rgba(100,160,255,0.3);\n    position: relative;\n  }\n\n  .nav-logo-text
    {\n    font-family: 'JetBrains Mono', 'Fira Code', monospace;\n    font-size:
    14px;\n    font-weight: 500;\n    color: var(--blue-lo);\n  }\n\n  .nav-logo-text
    span { color: var(--blue-mute); }\n\n  nav ul {\n    list-style: none;\n    display:
    flex;\n    gap: 32px;\n    align-items: center;\n  }\n\n  nav ul a {\n    color:
    var(--text-body);\n    text-decoration: none;\n    font-size: 13px;\n    transition:
    color 0.2s;\n  }\n\n  nav ul a:hover { color: var(--blue-lo); }\n\n  nav ul .nav-active
    {\n    color: var(--blue-lo);\n    border-bottom: 1.5px solid var(--blue-hi);\n
    \   padding-bottom: 2px;\n  }\n\n  nav ul .nav-cta {\n    color: var(--blue-lo);\n
    \   border: 1px solid var(--blue-dim);\n    padding: 4px 14px;\n    border-radius:
    20px;\n    font-size: 12px;\n    transition: border-color 0.2s, background 0.2s;\n
    \ }\n\n  nav ul .nav-cta:hover {\n    background: var(--blue-dim);\n    border-color:
    var(--blue-mid);\n    color: #fff;\n  }\n\n  /* ── HERO ── */\n  .hero {\n    position:
    relative;\n    padding: 80px 40px 60px;\n    overflow: hidden;\n    max-width:
    1100px;\n    margin: 0 auto;\n    display: grid;\n    grid-template-columns: 1fr
    420px;\n    gap: 40px;\n    align-items: center;\n    min-height: 280px;\n  }\n\n
    \ .hero-text h1 {\n    font-size: clamp(28px, 4vw, 44px);\n    font-weight: 500;\n
    \   color: var(--text-head);\n    line-height: 1.2;\n    letter-spacing: -0.5px;\n
    \ }\n\n  .hero-text h1 span { color: var(--blue-hi); }\n\n  .hero-text p {\n    margin-top:
    14px;\n    font-size: 14px;\n    color: var(--text-body);\n    font-family: monospace;\n
    \   letter-spacing: 0.3px;\n  }\n\n  .hero-tags {\n    margin-top: 22px;\n    display:
    flex;\n    flex-wrap: wrap;\n    gap: 8px;\n  }\n\n  .tag {\n    font-size: 11px;\n
    \   color: var(--blue-lo);\n    background: var(--bg-inset);\n    border: 1px
    solid var(--blue-dim);\n    border-radius: 20px;\n    padding: 4px 14px;\n    /*
    3D pill */\n    box-shadow: 0 2px 0 #091a40, inset 0 1px 0 rgba(68,136,255,0.15);\n
    \   position: relative;\n    top: 0;\n    transition: top 0.15s, box-shadow 0.15s;\n
    \ }\n\n  .tag:hover {\n    top: 1px;\n    box-shadow: 0 1px 0 #091a40, inset 0
    1px 0 rgba(68,136,255,0.15);\n  }\n\n  /* Black hole SVG canvas */\n  .hero-bh
    { width: 100%; max-width: 420px; }\n\n  /* ── DIVIDER ── */\n  .divider {\n    max-width:
    1100px;\n    margin: 0 auto;\n    padding: 0 40px;\n    display: flex;\n    align-items:
    center;\n    gap: 16px;\n  }\n\n  .divider hr {\n    flex: 1;\n    border: none;\n
    \   border-top: 1px solid var(--border);\n  }\n\n  .divider-bh {\n    display:
    flex;\n    align-items: center;\n    gap: 6px;\n  }\n\n  /* ── SECTION ── */\n
    \ section {\n    max-width: 1100px;\n    margin: 0 auto;\n    padding: 40px 40px
    0;\n  }\n\n  .section-label {\n    font-size: 11px;\n    letter-spacing: 3px;\n
    \   color: var(--text-dim);\n    text-transform: uppercase;\n    margin-bottom:
    20px;\n    font-family: monospace;\n  }\n\n  /* ── TOOL CARDS — 3D ── */\n  .cards-primary
    {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 20px;\n
    \   margin-bottom: 16px;\n  }\n\n  .cards-secondary {\n    display: grid;\n    grid-template-columns:
    repeat(4, 1fr);\n    gap: 14px;\n    margin-bottom: 40px;\n  }\n\n  .card {\n
    \   background: var(--bg-card);\n    border: 1px solid var(--border-hi);\n    border-radius:
    10px;\n    padding: 20px;\n    position: relative;\n    overflow: hidden;\n    /*
    3D layered shadow */\n    box-shadow:\n      2px 2px 0 var(--bg-deep),\n      4px
    4px 0 #090f1e,\n      0 8px 30px rgba(0,0,0,0.4),\n      inset 0 1px 0 rgba(42,68,170,0.3);\n
    \   transition: transform 0.2s, box-shadow 0.2s;\n  }\n\n  .card:hover {\n    transform:
    translate(-1px, -2px);\n    box-shadow:\n      3px 3px 0 var(--bg-deep),\n      5px
    5px 0 #090f1e,\n      0 14px 40px rgba(0,0,0,0.5),\n      inset 0 1px 0 rgba(42,68,170,0.3);\n
    \ }\n\n  /* Low-poly corner accent */\n  .card::before {\n    content: '';\n    position:
    absolute;\n    top: 0; left: 0;\n    width: 0; height: 0;\n    border-style: solid;\n
    \   border-width: 44px 44px 0 0;\n    border-color: rgba(26,47,255,0.18) transparent
    transparent transparent;\n  }\n\n  /* Top-left 3D highlight edge */\n  .card::after
    {\n    content: '';\n    position: absolute;\n    top: 0; left: 0; right: 0;\n
    \   height: 1px;\n    background: linear-gradient(90deg, rgba(68,136,255,0.4),
    transparent);\n  }\n\n  .card-icon {\n    width: 34px; height: 34px;\n    background:
    var(--bg-inset);\n    border: 1px solid var(--border-hi);\n    border-radius:
    8px;\n    display: flex; align-items: center; justify-content: center;\n    margin-bottom:
    14px;\n    /* 3D icon box */\n    box-shadow: 2px 2px 0 #091830, inset 0 1px 0
    rgba(68,136,255,0.2);\n    font-size: 16px;\n    position: relative;\n    z-index:
    1;\n  }\n\n  .card h3 {\n    font-size: 15px;\n    font-weight: 500;\n    color:
    var(--text-head);\n    margin-bottom: 3px;\n  }\n\n  .card .card-sub {\n    font-size:
    11px;\n    color: var(--blue-mute);\n    margin-bottom: 12px;\n    font-family:
    monospace;\n  }\n\n  .card hr {\n    border: none;\n    border-top: 1px solid
    var(--border);\n    margin-bottom: 10px;\n  }\n\n  .card ul {\n    list-style:
    none;\n    display: flex;\n    flex-direction: column;\n    gap: 5px;\n  }\n\n
    \ .card ul li {\n    font-size: 11px;\n    color: var(--text-dim);\n  }\n\n  .card
    ul li::before {\n    content: '✦ ';\n    color: var(--blue-dim);\n  }\n\n  .card-status
    {\n    position: absolute;\n    bottom: 16px; right: 16px;\n    width: 8px; height:
    8px;\n    background: var(--green);\n    border-radius: 50%;\n    box-shadow:
    0 0 6px var(--green);\n  }\n\n  .card-link {\n    font-size: 10px;\n    color:
    var(--blue-mute);\n    font-family: monospace;\n    margin-top: 8px;\n    display:
    block;\n  }\n\n  /* Small cards */\n  .card-sm {\n    padding: 16px;\n  }\n\n
    \ .card-sm .card-icon {\n    width: 28px; height: 28px;\n    font-size: 14px;\n
    \   margin-bottom: 10px;\n  }\n\n  .card-sm h3 { font-size: 13px; margin-bottom:
    2px; }\n  .card-sm .card-sub { font-size: 10px; margin-bottom: 8px; }\n  .card-sm
    ul li { font-size: 10px; }\n\n  /* ── GITOPS FLOW ── */\n  .flow {\n    display:
    flex;\n    align-items: center;\n    gap: 0;\n    margin-bottom: 12px;\n    overflow-x:
    auto;\n  }\n\n  .flow-step {\n    flex: 1;\n    min-width: 120px;\n    background:
    var(--bg-card);\n    border: 1px solid var(--border-hi);\n    border-radius: 8px;\n
    \   padding: 14px 16px;\n    text-align: center;\n    /* 3D */\n    box-shadow:
    2px 2px 0 var(--bg-deep), 4px 4px 0 #090f1e, inset 0 1px 0 rgba(42,68,170,0.2);\n
    \   position: relative;\n  }\n\n  .flow-step::after {\n    content: '';\n    position:
    absolute;\n    top: 0; left: 0; right: 0;\n    height: 1px;\n    background: linear-gradient(90deg,
    rgba(68,136,255,0.3), transparent);\n  }\n\n  .flow-num {\n    font-size: 18px;\n
    \   color: var(--blue-hi);\n    font-weight: 300;\n    display: block;\n    margin-bottom:
    2px;\n  }\n\n  .flow-name {\n    font-size: 12px;\n    color: var(--text-head);\n
    \   font-weight: 500;\n    display: block;\n    margin-bottom: 2px;\n  }\n\n  .flow-desc
    {\n    font-size: 10px;\n    color: var(--text-dim);\n    font-family: monospace;\n
    \ }\n\n  .flow-arrow {\n    flex: 0 0 40px;\n    display: flex;\n    flex-direction:
    column;\n    align-items: center;\n    gap: 2px;\n    padding: 0 4px;\n  }\n\n
    \ .flow-arrow svg { color: var(--blue-dim); }\n\n  .flow-arrow-label {\n    font-size:
    9px;\n    color: var(--text-dim);\n    font-family: monospace;\n    white-space:
    nowrap;\n  }\n\n  .flow-wave {\n    font-size: 10px;\n    color: var(--text-dim);\n
    \   font-family: monospace;\n    margin-top: 8px;\n    line-height: 1.8;\n  }\n\n
    \ /* ── ENDPOINTS ── */\n  .endpoints {\n    display: flex;\n    flex-direction:
    column;\n    gap: 10px;\n    margin-bottom: 40px;\n  }\n\n  .endpoint {\n    background:
    var(--bg-card);\n    border: 1px solid var(--border);\n    border-radius: 8px;\n
    \   padding: 14px 20px;\n    display: flex;\n    align-items: center;\n    gap:
    14px;\n    /* 3D */\n    box-shadow: 2px 2px 0 var(--bg-deep), inset 0 1px 0 rgba(42,68,170,0.15);\n
    \   transition: border-color 0.2s, transform 0.15s;\n    text-decoration: none;\n
    \   color: inherit;\n  }\n\n  .endpoint:hover {\n    border-color: var(--blue-mid);\n
    \   transform: translateX(2px);\n  }\n\n  .endpoint-dot {\n    width: 8px; height:
    8px;\n    border-radius: 50%;\n    background: var(--green);\n    box-shadow:
    0 0 6px var(--green);\n    flex-shrink: 0;\n  }\n\n  .endpoint-dot.soon {\n    background:
    var(--blue-hi);\n    box-shadow: 0 0 6px var(--blue-hi);\n  }\n\n  .endpoint-url
    {\n    font-size: 13px;\n    color: var(--blue-lo);\n    font-family: monospace;\n
    \   min-width: 220px;\n  }\n\n  .endpoint-desc {\n    font-size: 12px;\n    color:
    var(--text-body);\n    flex: 1;\n  }\n\n  .endpoint-arrow {\n    font-size: 11px;\n
    \   color: var(--text-dim);\n    margin-left: auto;\n  }\n\n  .endpoint-featured
    {\n    border-color: var(--blue-mid);\n    background: var(--bg-inset);\n    box-shadow:
    2px 2px 0 var(--bg-deep), 0 0 20px rgba(34,136,255,0.08), inset 0 1px 0 rgba(68,136,255,0.2);\n
    \ }\n\n  /* ── FOOTER ── */\n  footer {\n    margin-top: 20px;\n    border-top:
    1px solid var(--border);\n    padding: 40px;\n    max-width: 1100px;\n    margin-left:
    auto;\n    margin-right: auto;\n    display: flex;\n    align-items: center;\n
    \   justify-content: space-between;\n    gap: 40px;\n  }\n\n  .footer-left {\n
    \   display: flex;\n    align-items: center;\n    gap: 20px;\n  }\n\n  .footer-text
    h4 {\n    font-size: 14px;\n    color: var(--blue-lo);\n    font-weight: 500;\n
    \ }\n\n  .footer-text p {\n    font-size: 11px;\n    color: var(--text-dim);\n
    \   font-family: monospace;\n    margin-top: 3px;\n  }\n\n  .footer-tools {\n
    \   font-size: 10px;\n    color: var(--text-dim);\n    font-family: monospace;\n
    \   text-align: right;\n  }\n\n  /* ── BLACK HOLE SVG COMPONENTS ── */\n  /* Used
    inline in hero and footer */\n\n  /* ── SCROLL REVEAL ── */\n  .reveal {\n    opacity:
    0;\n    transform: translateY(16px);\n    transition: opacity 0.5s ease, transform
    0.5s ease;\n  }\n\n  .reveal.visible {\n    opacity: 1;\n    transform: translateY(0);\n
    \ }\n\n  /* Stagger children */\n  .reveal-stagger > * {\n    opacity: 0;\n    transform:
    translateY(14px);\n    transition: opacity 0.4s ease, transform 0.4s ease;\n  }\n\n
    \ .reveal-stagger.visible > *:nth-child(1) { opacity: 1; transform: none; transition-delay:
    0s; }\n  .reveal-stagger.visible > *:nth-child(2) { opacity: 1; transform: none;
    transition-delay: 0.08s; }\n  .reveal-stagger.visible > *:nth-child(3) { opacity:
    1; transform: none; transition-delay: 0.16s; }\n  .reveal-stagger.visible > *:nth-child(4)
    { opacity: 1; transform: none; transition-delay: 0.24s; }\n\n  @media (prefers-reduced-motion:
    reduce) {\n    .reveal, .reveal-stagger > * { transition: none; opacity: 1; transform:
    none; }\n    .card { transition: none; }\n  }\n\n  @media (max-width: 768px) {\n
    \   .hero { grid-template-columns: 1fr; }\n    .hero-bh { display: none; }\n    .cards-primary
    { grid-template-columns: 1fr; }\n    .cards-secondary { grid-template-columns:
    repeat(2, 1fr); }\n    .flow { flex-direction: column; }\n    .flow-arrow { transform:
    rotate(90deg); }\n    nav ul { gap: 16px; }\n    .nav-logo-text span { display:
    none; }\n    footer { flex-direction: column; align-items: flex-start; }\n    .footer-tools
    { text-align: left; }\n  }\n</style>\n</head>\n<body>\n\n<!-- ── NAVBAR ── -->\n<nav>\n
    \ <a href=\"#\" class=\"nav-logo\">\n    <div class=\"nav-logo-box\">λ</div>\n
    \   <span class=\"nav-logo-text\">lab<span>.kosar.sk</span></span>\n  </a>\n  <ul>\n
    \   <li><a href=\"#stack\" class=\"nav-active\">stack</a></li>\n    <li><a href=\"#gitops\">architecture</a></li>\n
    \   <li><a href=\"#endpoints\">endpoints</a></li>\n    <li><a href=\"https://github.com/xkosarf/k3s-gitops-argo\"
    target=\"_blank\" rel=\"noopener\" class=\"nav-cta\">github ↗</a></li>\n  </ul>\n</nav>\n\n<!--
    ── HERO ── -->\n<div class=\"hero\">\n  <div class=\"hero-text\">\n    <h1>Kubernetes<br><span>Security
    Lab</span></h1>\n    <p>Single-node K3s · Hetzner Cloud · GitOps via ArgoCD</p>\n
    \   <div class=\"hero-tags\">\n      <span class=\"tag\">ArgoCD</span>\n      <span
    class=\"tag\">Kyverno</span>\n      <span class=\"tag\">Falco</span>\n      <span
    class=\"tag\">Trivy</span>\n      <span class=\"tag\">Loki</span>\n      <span
    class=\"tag\">K3s v1.33</span>\n    </div>\n  </div>\n\n  <!-- Black hole hero
    illustration -->\n  <svg class=\"hero-bh\" viewBox=\"0 0 420 260\" xmlns=\"http://www.w3.org/2000/svg\"
    aria-hidden=\"true\">\n    <!-- Outer glow -->\n    <circle cx=\"210\" cy=\"130\"
    r=\"115\" fill=\"#111d30\" opacity=\"0.6\"/>\n    <circle cx=\"210\" cy=\"130\"
    r=\"95\" fill=\"#0d1828\" opacity=\"0.7\"/>\n    <!-- Accretion disk rings -->\n
    \   <ellipse cx=\"210\" cy=\"130\" rx=\"128\" ry=\"26\" fill=\"none\" stroke=\"#0a1a88\"
    stroke-width=\"3\" opacity=\"0.5\"/>\n    <ellipse cx=\"210\" cy=\"130\" rx=\"112\"
    ry=\"22\" fill=\"none\" stroke=\"#1133bb\" stroke-width=\"2.5\" opacity=\"0.5\"/>\n
    \   <ellipse cx=\"210\" cy=\"130\" rx=\"96\" ry=\"18\" fill=\"none\" stroke=\"#1a44dd\"
    stroke-width=\"2\" opacity=\"0.5\"/>\n    <ellipse cx=\"210\" cy=\"130\" rx=\"80\"
    ry=\"14\" fill=\"none\" stroke=\"#2255ff\" stroke-width=\"1.5\" opacity=\"0.6\"/>\n
    \   <ellipse cx=\"210\" cy=\"130\" rx=\"64\" ry=\"10\" fill=\"none\" stroke=\"#3366ff\"
    stroke-width=\"1\" opacity=\"0.5\"/>\n    <!-- Event horizon layers -->\n    <circle
    cx=\"210\" cy=\"130\" r=\"66\" fill=\"#1a2a44\"/>\n    <circle cx=\"210\" cy=\"130\"
    r=\"52\" fill=\"#111e38\"/>\n    <circle cx=\"210\" cy=\"130\" r=\"38\" fill=\"#0a1228\"/>\n
    \   <circle cx=\"210\" cy=\"130\" r=\"24\" fill=\"#060c1a\"/>\n    <circle cx=\"210\"
    cy=\"130\" r=\"11\" fill=\"#030608\"/>\n    <!-- Relativistic jets -->\n    <line
    x1=\"210\" y1=\"64\" x2=\"210\" y2=\"10\" stroke=\"#2255ff\" stroke-width=\"2\"
    opacity=\"0.5\"/>\n    <line x1=\"206\" y1=\"22\" x2=\"210\" y2=\"10\" stroke=\"#2255ff\"
    stroke-width=\"1\" opacity=\"0.35\"/>\n    <line x1=\"214\" y1=\"22\" x2=\"210\"
    y2=\"10\" stroke=\"#2255ff\" stroke-width=\"1\" opacity=\"0.35\"/>\n    <line
    x1=\"210\" y1=\"196\" x2=\"210\" y2=\"250\" stroke=\"#2255ff\" stroke-width=\"2\"
    opacity=\"0.5\"/>\n    <line x1=\"206\" y1=\"238\" x2=\"210\" y2=\"250\" stroke=\"#2255ff\"
    stroke-width=\"1\" opacity=\"0.35\"/>\n    <line x1=\"214\" y1=\"238\" x2=\"210\"
    y2=\"250\" stroke=\"#2255ff\" stroke-width=\"1\" opacity=\"0.35\"/>\n    <!--
    3D lensing highlight -->\n    <ellipse cx=\"196\" cy=\"116\" rx=\"20\" ry=\"15\"
    fill=\"#1a2a50\" opacity=\"0.25\"/>\n    <!-- Star field -->\n    <circle cx=\"40\"
    cy=\"30\" r=\"1.2\" fill=\"#4488ff\" opacity=\"0.6\"/>\n    <circle cx=\"90\"
    cy=\"18\" r=\"0.8\" fill=\"#66aaff\" opacity=\"0.5\"/>\n    <circle cx=\"330\"
    cy=\"22\" r=\"1.4\" fill=\"#4488ff\" opacity=\"0.5\"/>\n    <circle cx=\"380\"
    cy=\"45\" r=\"1\" fill=\"#88bbff\" opacity=\"0.4\"/>\n    <circle cx=\"60\" cy=\"200\"
    r=\"1\" fill=\"#4488ff\" opacity=\"0.4\"/>\n    <circle cx=\"370\" cy=\"210\"
    r=\"1.2\" fill=\"#66aaff\" opacity=\"0.5\"/>\n    <circle cx=\"20\" cy=\"130\"
    r=\"0.8\" fill=\"#4488ff\" opacity=\"0.4\"/>\n    <circle cx=\"400\" cy=\"100\"
    r=\"1\" fill=\"#88bbff\" opacity=\"0.5\"/>\n  </svg>\n</div>\n\n<!-- Section divider
    with inline black holes -->\n<div class=\"divider\">\n  <hr>\n  <div class=\"divider-bh\">\n
    \   <svg width=\"60\" height=\"16\" viewBox=\"0 0 60 16\" aria-hidden=\"true\">\n
    \     <circle cx=\"8\" cy=\"8\" r=\"5\" fill=\"#1a2a55\"/>\n      <ellipse cx=\"8\"
    cy=\"8\" rx=\"9\" ry=\"3\" fill=\"none\" stroke=\"#1a44ff\" stroke-width=\"0.8\"
    opacity=\"0.6\"/>\n      <circle cx=\"30\" cy=\"8\" r=\"7\" fill=\"#0f1e44\"/>\n
    \     <ellipse cx=\"30\" cy=\"8\" rx=\"12\" ry=\"3.5\" fill=\"none\" stroke=\"#2255ff\"
    stroke-width=\"1\" opacity=\"0.7\"/>\n      <circle cx=\"52\" cy=\"8\" r=\"5\"
    fill=\"#1a2a55\"/>\n      <ellipse cx=\"52\" cy=\"8\" rx=\"9\" ry=\"3\" fill=\"none\"
    stroke=\"#1a44ff\" stroke-width=\"0.8\" opacity=\"0.6\"/>\n    </svg>\n  </div>\n
    \ <hr>\n</div>\n\n<!-- ── STACK SECTION ── -->\n<section id=\"stack\">\n  <p class=\"section-label\">The
    Security Stack</p>\n\n  <div class=\"cards-primary reveal-stagger\">\n    <!--
    Kyverno -->\n    <div class=\"card\">\n      <div class=\"card-icon\">\U0001F6E1️</div>\n
    \     <h3>Kyverno</h3>\n      <p class=\"card-sub\">admission control</p>\n      <hr>\n
    \     <ul>\n        <li>PSS baseline policy (Audit)</li>\n        <li>Disallow
    :latest image tag (Enforce)</li>\n        <li>Require CPU &amp; memory limits</li>\n
    \       <li>Disallow privileged containers</li>\n      </ul>\n      <div class=\"card-status\"></div>\n
    \   </div>\n\n    <!-- Falco -->\n    <div class=\"card\">\n      <div class=\"card-icon\">\U0001F441️</div>\n
    \     <h3>Falco</h3>\n      <p class=\"card-sub\">runtime detection · eBPF</p>\n
    \     <hr>\n      <ul>\n        <li>modern_ebpf driver (kernel 6.8+)</li>\n        <li>Shell
