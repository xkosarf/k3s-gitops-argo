apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 34.2.1
    helm:
      values: |
        ingressClass:
          enabled: true
          isDefaultClass: true
        ports:
          web:
            redirectTo: websecure
        additionalArguments:
          - "--entrypoints.websecure.http.tls=true"
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
