apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: block-latest
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Using the 'latest' image tag is not allowed. Use a pinned tag or digest."
        pattern:
          spec:
            containers:
              - image: "!*:latest"
