apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-probes
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-liveness-and-readiness
      match:
        any:
          - resources:
              kinds:
                - Pod
      skipBackgroundRequests: true
      validate:
        allowExistingViolations: true
        message: "Containers must define livenessProbe and readinessProbe."
        pattern:
          spec:
            containers:
              - livenessProbe: "?*"
                readinessProbe: "?*"
